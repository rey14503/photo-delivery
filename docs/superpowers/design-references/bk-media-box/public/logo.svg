<svg
  viewBox="0 0 500 500"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
>
  <!-- Outer offset thin aesthetic ring -->
  <circle
    cx="210"
    cy="260"
    r="170"
    stroke="#FF5722"
    stroke-width="3"
    stroke-dasharray="8 4"
    opacity="0.4"
  />
  <circle
    cx="195"
    cy="260"
    r="175"
    stroke="#FF5722"
    stroke-width="1.5"
    opacity="0.3"
  />

  <!-- Main camera body outline -->
  <path
    d="M210 120H470V450H210"
    stroke="#FF5722"
    stroke-width="14"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Top Handle / Strap Mount -->
  <path
    d="M260 80C260 55 280 40 305 40H425C450 40 470 55 470 80V120H260V80Z"
    fill="#FF5722"
  />

  <!-- Inner Lens Area Circle -->
  <circle
    cx="210"
    cy="260"
    r="150"
    stroke="#FF5722"
    stroke-width="14"
    fill="transparent"
  />

  <!-- Large aesthetic swooping brush/film curve - matches original logo perfectly -->
  <path
    d="M 210 110 C 292.8 110, 360 177.2, 360 260 C 360 330, 320 410, 395 450 L 470 450 L 470 120 L 210 120 Z"
    fill="#FF5722"
  />

  <!-- Central Aperture Shutter / Blades structure -->
  <!-- Central Hexagon -->
  <polygon
    points="210,230 245,245 245,275 210,290 175,275 175,245"
    fill="#FF5722"
  />

  <!-- Radiating Shutter Blade Lines -->
  <line x1="210" y1="110" x2="210" y2="230" stroke="#FF5722" stroke-width="8" stroke-linecap="round" />
  <line x1="340" y1="185" x2="245" y2="245" stroke="#FF5722" stroke-width="8" stroke-linecap="round" />
  <line x1="340" y1="335" x2="245" y2="275" stroke="#FF5722" stroke-width="8" stroke-linecap="round" />
  <line x1="210" y1="410" x2="210" y2="290" stroke="#FF5722" stroke-width="8" stroke-linecap="round" />
  <line x1="80" y1="335" x2="175" y2="275" stroke="#FF5722" stroke-width="8" stroke-linecap="round" />
  <line x1="80" y1="185" x2="175" y2="245" stroke="#FF5722" stroke-width="8" stroke-linecap="round" />
</svg>
